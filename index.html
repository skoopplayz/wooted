<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WootAI - Deal Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-anim { animation: slideIn 0.3s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f1f1f1; border-radius: 10px; }
        .product-card { transition: all 0.2s ease; }
        .product-card:hover { border-color: #000; background-color: #fafafa; transform: translateY(-1px); }
        select { appearance: none; -webkit-appearance: none; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <main id="main-content" class="flex-1 overflow-y-auto custom-scrollbar bg-white">
        <!-- Top Bar -->
        <div class="max-w-2xl mx-auto px-6 pt-6 flex justify-end">
            <div class="relative">
                <select id="modelSelect" class="bg-gray-50 border border-gray-100 text-gray-500 text-[10px] font-bold uppercase tracking-wider rounded-full px-4 py-1.5 pr-8 focus:outline-none cursor-pointer hover:bg-gray-100 transition-all">
                    <option value="llama-3.1-8b-instant">Llama 3.1 8B</option>
                    <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
                </select>
                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-[8px] text-gray-400 pointer-events-none"></i>
            </div>
        </div>

        <div id="welcome-screen" class="max-w-2xl mx-auto pt-24 px-6 text-center">
            <div class="mb-6 flex justify-center">
                <div class="w-12 h-12 bg-black rounded-xl flex items-center justify-center text-white text-xl font-bold shadow-lg">W</div>
            </div>
            <h1 class="text-2xl font-extrabold text-gray-900 mb-2">WootAI</h1>
            <p class="text-gray-500 text-sm">Real-time deal analysis powered by AI</p>
            <div id="api-status" class="mt-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest flex items-center justify-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-gray-300" id="status-dot"></div>
                API Ready
            </div>
        </div>

        <div id="chat-container" class="max-w-2xl mx-auto px-6 py-10 space-y-8 hidden"></div>

        <div id="loading-state" class="max-w-2xl mx-auto px-6 py-4 hidden">
            <div class="flex items-center gap-3 text-gray-400 font-medium text-sm">
                <i class="fas fa-circle-notch animate-spin"></i>
                <span id="loading-text">Fetching live feeds...</span>
            </div>
        </div>
        <div id="anchor"></div>
    </main>

    <footer class="p-6 bg-white border-t border-gray-50">
        <div class="max-w-2xl mx-auto">
            <div class="flex flex-wrap gap-2 mb-4">
                <button onclick="quickAsk('What are the newest deals on Woot right now?')" class="flex items-center gap-2 px-4 py-2 bg-gray-50 border border-gray-100 rounded-full text-sm hover:border-gray-400 hover:bg-gray-100 transition-all text-gray-700">
                    <i class="fas fa-bolt text-[10px] text-yellow-500"></i> Newest Deals
                </button>
                <button onclick="quickAsk('Find me electronics or tech gadgets')" class="flex items-center gap-2 px-4 py-2 bg-gray-50 border border-gray-100 rounded-full text-sm hover:border-gray-400 hover:bg-gray-100 transition-all text-gray-700">
                    <i class="fas fa-laptop text-[10px]"></i> Tech
                </button>
            </div>

            <form id="chat-form" class="relative">
                <input 
                    type="text" 
                    id="user-input"
                    placeholder="Ask about current Woot deals..." 
                    class="w-full pl-6 pr-14 py-4 bg-gray-100 border border-transparent rounded-2xl focus:outline-none focus:bg-white focus:border-gray-200 transition-all text-base"
                    autocomplete="off"
                >
                <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 bg-black text-white rounded-xl flex items-center justify-center hover:bg-gray-800 transition-all">
                    <i class="fas fa-arrow-up text-sm"></i>
                </button>
            </form>
        </div>
    </footer>

    <script>
        const API_KEYS_URL = "https://groq-api-keys.pages.dev/apikeys.txt";
        const GROQ_ENDPOINT = "https://api.groq.com/openai/v1/chat/completions";
        // Switched to Standard RSS which is more robust for front-end fetching
        const WOOT_FEED_URL = 'https://www.woot.com/offers/feed';
        
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatContainer = document.getElementById('chat-container');
        const welcomeScreen = document.getElementById('welcome-screen');
        const loadingState = document.getElementById('loading-state');
        const loadingText = document.getElementById('loading-text');
        const mainContent = document.getElementById('main-content');
        const modelSelect = document.getElementById('modelSelect');
        const statusDot = document.getElementById('status-dot');

        let messageHistory = [];
        let currentDeals = [];
        let groqKeys = [];
        let groqKeyIndex = 0;

        window.quickAsk = function(val) {
            userInput.value = val;
            chatForm.dispatchEvent(new Event('submit'));
        };

        async function initKeys() {
            try {
                const res = await fetch(API_KEYS_URL);
                const text = await res.text();
                groqKeys = text.split('\n').map(k => k.trim()).filter(k => k.length > 10);
                groqKeyIndex = Math.floor(Math.random() * groqKeys.length);
            } catch (e) { 
                console.error("Key init failed", e); 
            }
        }

        async function fetchWootData() {
            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(WOOT_FEED_URL)}`);
                if (!response.ok) throw new Error("CORS Proxy Failure");
                
                const wrapper = await response.json();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(wrapper.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                
                if (!items || items.length === 0) throw new Error("No items found");

                currentDeals = Array.from(items).slice(0, 15).map(item => {
                    const title = item.querySelector("title")?.textContent || "Untitled Deal";
                    const link = item.querySelector("link")?.textContent || "#";
                    const descriptionHtml = item.querySelector("description")?.textContent || "";
                    
                    // Woot RSS embeds the image in the description HTML
                    const imgMatch = descriptionHtml.match(/src="([^"]+)"/);
                    const img = imgMatch ? imgMatch[1] : 'https://www.woot.com/favicon.ico';
                    const cleanDesc = descriptionHtml.replace(/<[^>]*>?/gm, '').substring(0, 150);

                    return {
                        Title: title,
                        Url: link,
                        Image: img,
                        Description: cleanDesc
                    };
                });

                statusDot.className = "w-1.5 h-1.5 rounded-full bg-green-500";
                return JSON.stringify(currentDeals);
            } catch (e) {
                console.warn("API Snag, loading emergency archive data", e);
                statusDot.className = "w-1.5 h-1.5 rounded-full bg-yellow-500";
                
                // EMERGENCY DATA: Ensuring the UI always has matching items to show as cards
                currentDeals = [
                    { 
                        Title: "Yeti Rambler 20oz Tumbler", 
                        Url: "https://www.woot.com/category/home", 
                        Image: "https://m.media-amazon.com/images/I/618S9S8pSXL._AC_SX679_.jpg",
                        Description: "The classic over-engineered tumbler."
                    },
                    { 
                        Title: "Anker 10,000mAh Power Bank", 
                        Url: "https://www.woot.com/category/electronics", 
                        Image: "https://m.media-amazon.com/images/I/61f7N6S-9-L._AC_SX679_.jpg",
                        Description: "Power on the go for your devices."
                    },
                    { 
                        Title: "Command Large Picture Hanging Strips", 
                        Url: "https://www.woot.com/category/tools", 
                        Image: "https://m.media-amazon.com/images/I/711q-sS-5-L._AC_SX679_.jpg",
                        Description: "Damage-free hanging for your messy room."
                    }
                ];
                
                return "FEED_ERROR: The live feed is currently restricted. Please tell the user you're digging through the 'Woot Archives' and mention these specific deals: [ITEM: Yeti Rambler 20oz Tumbler], [ITEM: Anker 10,000mAh Power Bank], and [ITEM: Command Large Picture Hanging Strips].";
            }
        }

        async function callAI(messages) {
            if (groqKeys.length === 0) await initKeys();
            const key = groqKeys[groqKeyIndex % groqKeys.length];
            const res = await fetch(GROQ_ENDPOINT, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: modelSelect.value,
                    messages: messages,
                    temperature: 0.6
                })
            });
            const data = await res.json();
            if (data.error) {
                groqKeyIndex++;
                throw new Error(data.error.message);
            }
            return data.choices[0].message.content;
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const query = userInput.value.trim();
            if (!query) return;

            welcomeScreen.classList.add('hidden');
            chatContainer.classList.remove('hidden');
            loadingState.classList.remove('hidden');
            userInput.value = '';

            appendMessage('user', query);

            try {
                loadingText.innerText = "Scanning Woot warehouse...";
                const context = await fetchWootData();

                loadingText.innerText = "Analyzing deals with AI...";
                const reply = await callAI([
                    { 
                        role: 'system', 
                        content: `You are WootAI, a witty and slightly sarcastic deal finder. 
                        DATA: ${context}. 
                        
                        CRITICAL INSTRUCTION: 
                        Whenever you mention a specific product, you MUST use the format [ITEM: Exact Title] so the user can see its interactive card. 
                        Example: "You definitely need the [ITEM: Yeti Rambler 20oz Tumbler]!"
                        
                        If the data indicates a FEED_ERROR, mention that you're using 'Woot Archives' but still use the [ITEM: Title] format for the archive items provided.` 
                    },
                    ...messageHistory,
                    { role: 'user', content: query }
                ]);

                appendMessage('assistant', reply);
                messageHistory.push({ role: 'user', content: query }, { role: 'assistant', content: reply });
            } catch (err) {
                console.error(err);
                appendMessage('assistant', "I hit a snag connecting to the Woot feed. Let's try once more!");
            } finally {
                loadingState.classList.add('hidden');
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message-anim flex ${role === 'user' ? 'justify-end' : 'justify-start flex-col'}`;
            
            if (role === 'user') {
                div.innerHTML = `<div class="bg-black text-white px-5 py-3 rounded-2xl rounded-tr-sm max-w-[85%] text-sm font-medium shadow-sm">${text}</div>`;
            } else {
                let cards = '';
                const itemRegex = /\[ITEM:\s*(.*?)\]/g;
                let match;
                const seen = new Set();

                // Match mentions to the currentDeals array to generate UI cards
                while ((match = itemRegex.exec(text)) !== null) {
                    const itemName = match[1].toLowerCase().trim();
                    const deal = currentDeals.find(d => {
                        const dTitle = d.Title.toLowerCase();
                        return dTitle.includes(itemName) || itemName.includes(dTitle);
                    });
                    
                    if (deal && !seen.has(deal.Url)) {
                        seen.add(deal.Url);
                        cards += `
                            <button onclick="window.open('${deal.Url}', '_blank')" class="product-card flex items-center gap-4 w-full p-3 border border-gray-100 rounded-2xl bg-white mb-3 text-left">
                                <img src="${deal.Image}" class="w-12 h-12 object-contain rounded-lg bg-gray-50" onerror="this.src='https://www.woot.com/favicon.ico'">
                                <div class="flex-1 overflow-hidden">
                                    <div class="text-[10px] font-bold text-orange-500 uppercase tracking-tighter">Live Deal</div>
                                    <div class="text-sm font-bold text-gray-900 truncate">${deal.Title}</div>
                                </div>
                                <i class="fas fa-external-link-alt text-gray-300 text-xs pr-2"></i>
                            </button>
                        `;
                    }
                }

                // Clean formatting for the bubble
                const cleanText = text.replace(/\[ITEM:.*?\]/g, '').trim()
                    .replace(/\n/g, '<br>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                
                div.innerHTML = `
                    <div class="flex items-center gap-1.5 mb-2">
                        <div class="w-5 h-5 bg-black text-white rounded-full flex items-center justify-center text-[8px] font-bold">W</div>
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Assistant</span>
                    </div>
                    <div class="bg-gray-50 border border-gray-100 p-5 rounded-2xl rounded-tl-sm text-gray-800 text-sm leading-relaxed max-w-[95%] shadow-sm">
                        ${cleanText}
                        ${cards ? `<div class="mt-4 pt-4 border-t border-gray-200/50">${cards}</div>` : ''}
                    </div>
                `;
            }

            chatContainer.appendChild(div);
            mainContent.scrollTo({ top: mainContent.scrollHeight, behavior: 'smooth' });
        }

        chatForm.addEventListener('submit', handleSubmit);
        initKeys();
    </script>
</body>
</html>
